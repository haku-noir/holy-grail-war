<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holy Grail War - Round Table 13</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Title Screen -->
      <div id="title-screen" class="screen">
        <h1 class="main-title">Holy Grail War</h1>
        <div class="subtitle">Round Table 13</div>
        <div class="input-group">
          <input type="text" id="player-name-input" placeholder="Enter Player Name" value="Player" />
        </div>
        <div class="menu-buttons">
          <button id="btn-to-cpu-setup" class="menu-btn">CPU Battle</button>
          <button id="btn-online-battle" class="menu-btn">Online PvP</button>
        </div>
      </div>

      <!-- CPU Setup Screen -->
      <div id="cpu-setup-screen" class="screen hidden">
        <h2>CPU Battle Setup</h2>
        <div class="setup-group">
            <h3>Difficulty Level</h3>
            <div class="level-buttons">
                <button class="level-btn selected" data-level="1">
                    <span class="lvl-num">LV 1</span>
                    <span class="lvl-name">Random</span>
                </button>
                <button class="level-btn" data-level="2">
                    <span class="lvl-num">LV 2</span>
                    <span class="lvl-name">Standard</span>
                </button>
                <button class="level-btn" data-level="3">
                    <span class="lvl-num">LV 3</span>
                    <span class="lvl-name">Ultimate</span>
                </button>
            </div>
            <div id="level-desc">Level 1: Completely random moves.</div>
        </div>
        <div class="setup-group">
             <label class="checkbox-container">
                <input type="checkbox" id="chk-hand-open-cpu" checked>
                <span>相手の手札を公開する (Open Hand)</span>
              </label>
        </div>
        <div class="menu-buttons">
             <button id="btn-start-cpu-battle" class="menu-btn">Start Battle</button>
             <button id="btn-back-from-cpu" class="menu-btn secondary">Back</button>
        </div>
      </div>

      <!-- Lobby Screen -->
      <div id="lobby-screen" class="screen hidden">
        <h2>Online Lobby</h2>
        <div class="lobby-controls">
          <div class="create-room-group">
            <button id="btn-create-room" class="menu-btn small">Create Room</button>
            <label class="checkbox-container small">
              <input type="checkbox" id="chk-hand-open-online" checked>
              <span>Open Hand</span>
            </label>
          </div>
          <button id="btn-refresh-rooms" class="menu-btn small">Refresh</button>
          <button id="btn-back-title" class="menu-btn small secondary">Back</button>
        </div>
        <div id="room-list" class="room-list">
          <!-- Rooms will be populated here -->
          <div class="room-item empty-message">No rooms found. Create one!</div>
        </div>
        <div id="waiting-message" class="hidden">Waiting for opponent...</div>
      </div>

      <!-- Game Screen -->
      <div id="game-screen" class="screen hidden">
        <!-- Game Over Overlay -->
        <div id="game-over-overlay" class="overlay hidden">
          <h1 id="winner-text">Winner: P1</h1>
          <div class="game-over-buttons">
            <button id="restart-btn" class="menu-btn small">Rematch</button>
            <button id="return-title-btn" class="menu-btn small secondary">Return to Title</button>
          </div>
        </div>

        <div class="game-layout">
        <!-- Left: Side Panel -->
        <aside class="side-panel">
          <h2 class="game-title">Holy Grail War</h2>
          <div class="turn-indicator">Turn <span id="turn-count">1</span>/5</div>
          <div class="phase-indicator" id="phase-text">Selection</div>
          <div class="log-container" id="log-container">
            <!-- Logs go here -->
          </div>
        </aside>

        <!-- Right: Board -->
        <main class="board">

          <!-- Opponent Area -->
          <div class="player-area opponent">
            <div class="player-info">
              <span class="player-name">Enemy (CPU)</span>
              <div class="grail-counter">🏆 <span id="p2-grails">2</span></div>
            </div>
            <div class="hand-container" id="p2-hand">
              <!-- Back of cards -->
            </div>
          </div>

          <!-- Battle Area -->
          <div class="battle-area">
            <div class="battle-slot" id="p2-slot">
              <div class="card-placeholder">Enemy Slot</div>
            </div>
            <div class="versus">VS</div>
            <div class="battle-slot" id="p1-slot">
              <div class="card-placeholder">Your Slot</div>
            </div>
            <div id="battle-result-text" class="battle-result-text"></div>
          </div>

          <!-- Player Area -->
          <div class="player-area player">
            <div class="player-info">
              <span class="player-name">Player 1</span>
              <div class="grail-counter">🏆 <span id="p1-grails">2</span></div>
            </div>
            <div class="hand-container" id="p1-hand">
              <!-- Playable cards -->
            </div>
          </div>

        </main>
      </div>
      </div> <!-- End of game-screen -->
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
